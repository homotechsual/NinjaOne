name: Create GitHub Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for branch validation

      - name: Validate tag source
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_COMMIT="${GITHUB_SHA}"
          
          if [[ "${TAG_NAME}" =~ -(alpha|beta|rc) ]]; then
            echo "Pre-release tag detected: ${TAG_NAME}"
            if git merge-base --is-ancestor "${TAG_COMMIT}" origin/develop; then
              echo "Tag commit is reachable from develop."
            else
              echo "Tag commit is NOT reachable from develop." >&2
              exit 1
            fi
          else
            echo "Stable tag detected: ${TAG_NAME}"
            if git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
              echo "Tag commit is reachable from main."
            else
              echo "Tag commit is NOT reachable from main." >&2
              exit 1
            fi
          fi
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version_name="${tag_name#v}"
          notes_file="$(mktemp)"
          awk -v ver="$version_name" '
            BEGIN { p = 0 }
            /^## / {
              if (p) { exit }
              if ($0 ~ "Version " ver) { p = 1; next }
            }
            p { print }
          ' CHANGELOG.md > "$notes_file"

          {
            echo ""
            echo "---"
            echo ""
            echo "Release links:"
            echo "- PowerShell Gallery: https://www.powershellgallery.com/packages/NinjaOne/${version_name}"
            echo "- GitHub Packages: https://github.com/${GITHUB_REPOSITORY}/packages?package_type=nuget"
          } >> "$notes_file"

          if [ -s "$notes_file" ]; then
            gh release create "$tag_name" --notes-file "$notes_file"
          else
            gh release create "$tag_name" --generate-notes
          fi

