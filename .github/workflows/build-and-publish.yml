name: Build and Publish Module

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write

jobs:
  build:
    name: Build Module
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Validate tag source (main)
        shell: pwsh
        if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/test-v')
        run: |
          $ErrorActionPreference = 'Stop'
          $tagCommit = $env:GITHUB_SHA
          $mainCommit = (git rev-parse origin/main)
          $mergeBase = (git merge-base $tagCommit $mainCommit)
          if ($mergeBase -ne $tagCommit) {
            throw 'Stable tag commit is not reachable from main.'
          }

      - name: Bootstrap environment
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:GITHUB_WORKSPACE\DevOps\Build\bootstrap.ps1"

      - name: Build module
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:GITHUB_WORKSPACE\DevOps\Build\build.ps1" -TaskNames 'clean', 'build'

      - name: Generate documentation  
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:GITHUB_WORKSPACE\DevOps\Build\build.ps1" -TaskNames 'generateShortNamesMapping', 'updateHelp', 'publishDocs'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: module-build
          path: output/
          retention-days: 30

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: module-docs
          path: .build/docs/
          retention-days: 30

  publish:
    name: Publish to PowerShell Gallery
    runs-on: windows-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/tags/test-v')
    environment:
      name: production
      url: https://www.powershellgallery.com/packages/NinjaOne
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap environment
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = 'Stop'
          & "$env:GITHUB_WORKSPACE\DevOps\Build\bootstrap.ps1"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: module-build
          path: output/

      - name: Package module for release
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tagName = "$env:GITHUB_REF_NAME"
          $zipName = "NinjaOne-$tagName.zip"
          $zipPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath $zipName
          if (Test-Path -Path $zipPath) { Remove-Item -Path $zipPath -Force }
          Compress-Archive -Path (Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath 'output\*') -DestinationPath $zipPath
          Write-Host "Created release asset: $zipPath"

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGalleryAPIKey: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $moduleManifest = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\output" -Recurse -Filter 'NinjaOne.psd1' | Select-Object -First 1
          if (-not $moduleManifest) {
            throw 'Module manifest not found under output/. Ensure build artifacts are present.'
          }
          $manifest = Test-ModuleManifest -Path $moduleManifest.FullName
          $version = $manifest.Version.ToString()
          if ($manifest.PrivateData.PSData.Prerelease) {
            $version = "$version-$($manifest.PrivateData.PSData.Prerelease)"
          }
          Write-Host "Checking if NinjaOne version $version already exists on PSGallery..."
          try {
            $existingModule = Find-Module -Name 'NinjaOne' -RequiredVersion $version -ErrorAction SilentlyContinue
            if ($existingModule) {
              Write-Host "::warning::Module version $version already exists on PSGallery. Skipping publish."
              exit 0
            }
          } catch {
            # Module not found or error querying - proceed with publish
            Write-Host "Module version $version not found on PSGallery. Proceeding with publish."
          }
          & "$env:GITHUB_WORKSPACE\DevOps\Build\build.ps1" -TaskNames 'publish'

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repoOwner = '${{ github.repository_owner }}'
          $repoSource = "https://nuget.pkg.github.com/$repoOwner/index.json"
          if (-not (Get-PSRepository -Name 'GitHub' -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Name 'GitHub' -SourceLocation $repoSource -PublishLocation $repoSource -InstallationPolicy Trusted
          }
          $moduleManifest = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\output" -Recurse -Filter 'NinjaOne.psd1' | Select-Object -First 1
          if (-not $moduleManifest) {
            throw 'Module manifest not found under output/. Ensure build artifacts are present.'
          }
          if (-not $env:GH_PACKAGES_TOKEN) {
            throw 'GH_PACKAGES_TOKEN is not set. Add a classic PAT with packages:write scope.'
          }
          $manifest = Test-ModuleManifest -Path $moduleManifest.FullName
          $version = $manifest.Version.ToString()
          if ($manifest.PrivateData.PSData.Prerelease) {
            $version = "$version-$($manifest.PrivateData.PSData.Prerelease)"
          }
          Write-Host "Checking if NinjaOne version $version already exists on GitHub Packages..."
          try {
            $existingModule = Find-Module -Name 'NinjaOne' -Repository 'GitHub' -RequiredVersion $version -ErrorAction SilentlyContinue
            if ($existingModule) {
              Write-Host "::warning::Module version $version already exists on GitHub Packages. Skipping publish."
              exit 0
            }
          } catch {
            # Module not found or error querying - proceed with publish
            Write-Host "Module version $version not found on GitHub Packages. Proceeding with publish."
          }
          Publish-Module -Path $moduleManifest.Directory.FullName -Repository 'GitHub' -NuGetApiKey $env:GH_PACKAGES_TOKEN

      - name: Close matching milestone
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $milestoneTitle = $env:GITHUB_REF_NAME -replace '^v', ''
          Write-Host "Looking for milestone: $milestoneTitle"
          $milestoneNumber = gh api repos/$env:GITHUB_REPOSITORY/milestones --jq ".[] | select(.title==\"$milestoneTitle\") | .number" | Select-Object -First 1
          if ($milestoneNumber) {
            Write-Host "Closing milestone #$milestoneNumber ($milestoneTitle)"
            gh api -X PATCH repos/$env:GITHUB_REPOSITORY/milestones/$milestoneNumber -f state=closed
          } else {
            Write-Host "No open milestone found matching '$milestoneTitle'"
          }

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          files: NinjaOne-${{ github.ref_name }}.zip
