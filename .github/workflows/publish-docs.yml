name: Publish Documentation

on:
  release:
    types: [published]

jobs:
  publish-docs:
    name: Publish docs to homotechsualdocs
    runs-on: windows-latest
    steps:
      - name: Checkout NinjaOne repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Find build workflow run
        id: find-run
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.event.release.tag_name }}'
          # Get the latest successful build workflow run for this tag
          $runs = gh run list --workflow build-and-publish.yml --status success --json databaseId,headBranch | ConvertFrom-Json
          # Find the run that corresponds to this tag
          $run = $runs | Where-Object { $_.headBranch -eq $tag } | Select-Object -First 1
          if ($run) {
            echo "run_id=$($run.databaseId)" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "Could not find build workflow run for tag $tag"
            exit 1
          }

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: module-docs
          path: docs/
          run-id: ${{ steps.find-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone and update homotechsualdocs
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          # Clone homotechsualdocs with authentication
          git clone https://x-access-token:$env:GH_TOKEN@github.com/homotechsual/homotechsualdocs.git docs-repo
          
          Push-Location docs-repo
          try {
            # Verify documentation was generated
            if (-not (Test-Path '../docs/NinjaOne/commandlets')) {
              Write-Error "Documentation not found. Build may have failed to generate docs."
              exit 1
            }
            
            # Replace docs
            if (Test-Path 'docs/ninjaone/commandlets') {
              Remove-Item -Path 'docs/ninjaone/commandlets' -Recurse -Force
            }
            New-Item -Path 'docs/ninjaone/commandlets' -ItemType Directory -Force | Out-Null
            
            # Copy generated docs
            Copy-Item -Path '../docs/NinjaOne/commandlets/*' -Destination 'docs/ninjaone/commandlets' -Recurse -Force
            
            # Configure git
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            
            # Check if there are changes
            $changes = git status --porcelain
            if (-not $changes) {
              Write-Host "No documentation changes to commit." -ForegroundColor Yellow
              exit 0
            }
            
            # Commit and push
            git add docs/ninjaone/commandlets
            $commitMsg = "Docs update for NinjaOne ${{ github.event.release.tag_name }}"
            git commit -m $commitMsg
            git push origin main
            
            Write-Host "✓ Documentation published to homotechsualdocs" -ForegroundColor Green
          } finally {
            Pop-Location
          }
