name: Publish Documentation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ['Build and Publish Module']
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Successful Build and Publish Module workflow run id that produced the docs artifact'
        required: true
        type: string
      tag_name:
        description: 'Release tag associated with the documentation, for example v2.4.1'
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  publish-docs:
    name: Publish docs to homotechsualdocs
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        startsWith(github.event.workflow_run.head_branch, 'v')
      )
    steps:
      - name: Checkout NinjaOne repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve workflow context
        id: context
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $runId = '${{ inputs.run_id }}'
            $tagName = '${{ inputs.tag_name }}'
          } else {
            $runId = '${{ github.event.workflow_run.id }}'
            $tagName = '${{ github.event.workflow_run.head_branch }}'
          }

          if ([string]::IsNullOrWhiteSpace($runId)) {
            Write-Error 'Workflow run id was not provided by the event payload.'
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace($tagName) -or -not $tagName.StartsWith('v')) {
            Write-Error "Expected a tag-based workflow run, received head_branch '$tagName'."
            exit 1
          }

          "run_id=$runId" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT

      - name: Download documentation artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          gh run download ${{ steps.context.outputs.run_id }} --name module-docs --dir docs-artifact

      - name: Clone and update homotechsualdocs
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $sourceCommandletsPath = Get-ChildItem -Path 'docs-artifact' -Directory -Recurse |
            Where-Object {
              $_.Name -eq 'commandlets' -and
              $_.Parent -and
              $_.Parent.Name -ieq 'ninjaone'
            } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $sourceCommandletsPath) {
            Write-Error 'Documentation artifact does not contain a docs/ninjaone/commandlets directory.'
            exit 1
          }

          Write-Host "Using documentation from: $sourceCommandletsPath" -ForegroundColor Cyan

          # Clone homotechsualdocs with authentication
          git -c core.autocrlf=false clone https://x-access-token:$env:GH_TOKEN@github.com/homotechsual/homotechsualdocs.git docs-repo
          
          Push-Location docs-repo
          try {
            git config core.autocrlf false
            git remote set-url origin https://x-access-token:$env:GH_TOKEN@github.com/homotechsual/homotechsualdocs.git

            $targetBranch = 'main'
            git fetch origin $targetBranch
            git checkout -B $targetBranch "origin/$targetBranch"

            # Verify token can push before doing file operations.
            $pushCheckSucceeded = $true
            try {
              git push --dry-run origin "HEAD:$targetBranch"
            } catch {
              $pushCheckSucceeded = $false
            }
            if (-not $pushCheckSucceeded) {
              Write-Error "DOCS_REPO_TOKEN cannot push to homotechsual/homotechsualdocs:$targetBranch. Ensure the token has repository write access (contents:write)."
              exit 1
            }

            # Replace docs
            if (Test-Path 'docs/ninjaone/commandlets') {
              Remove-Item -Path 'docs/ninjaone/commandlets' -Recurse -Force
            }
            New-Item -Path 'docs/ninjaone/commandlets' -ItemType Directory -Force | Out-Null
            
            # Copy generated docs
            Copy-Item -Path (Join-Path -Path $sourceCommandletsPath -ChildPath '*') -Destination 'docs/ninjaone/commandlets' -Recurse -Force
            
            # Configure git
            git config user.email "action@github.com"
            git config user.name "GitHub Action"
            
            # Check if there are changes
            $changes = git status --porcelain
            if (-not $changes) {
              Write-Host "No documentation changes to commit." -ForegroundColor Yellow
              exit 0
            }
            
            # Commit and push
            git add docs/ninjaone/commandlets
            $commitMsg = "Docs update for NinjaOne ${{ steps.context.outputs.tag_name }}"
            git commit -m $commitMsg
            git push origin "HEAD:$targetBranch"
            
            Write-Host "✓ Documentation published to homotechsualdocs" -ForegroundColor Green
          } finally {
            Pop-Location
          }
